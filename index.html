<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .container { display: flex; flex-direction: column; gap: 1rem; }
        a { 
            display: block; 
            padding: 0.75rem; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            text-align: left; 
            text-decoration: none; 
            font: inherit;                /* matches button font behaviour */
            box-sizing: border-box;      /* matches button’s default box-sizing */
        }
        a:hover { background: #0056b3; }
        a:active { background: #004080; }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://lateweb.github.io/lista">Lista</a>
        <a href="https://lateweb.github.io/nhl11fin">NHL 11 – Suomen kokoonpano</a>
        <a href="https://lateweb.github.io/pyrpas">Pyramidipasianssi</a>
        <a href="https://lateweb.github.io/visa">Visa</a>
        <a href="https://lateweb.github.io/aiohje">AI-ohje</a>
    </div>
</body>
</html>
