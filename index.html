<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lateweb</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        a {
            display: block;
            color: #007bff;
            text-decoration: none;
            text-align: left;
            font: inherit;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://lateweb.github.io/lista">Lista</a>
        <a href="https://lateweb.github.io/nhl11fin">NHL 11 – Suomen kokoonpano</a>
        <a href="https://lateweb.github.io/pyrpas">Pyramidipasianssi</a>
        <a href="https://lateweb.github.io/visa">Visa</a>
        <a href="https://lateweb.github.io/aiohje">AI-ohje</a>
        <a href="https://lateweb.github.io/laskin">Laskin</a>
        <a href="https://lateweb.github.io/pdftotxt">PDFtoTXT</a>
    </div>

    <script>
        (function () {
            const container = document.querySelector('.container');
            if (!container) return;
            const links = Array.from(container.querySelectorAll('a'));
            // Sort alphabetically by link text (case‑insensitive)
            links.sort((a, b) =>
                a.textContent.trim().localeCompare(b.textContent.trim(), undefined, { sensitivity: 'base' })
            );
            // Re-append in sorted order (moves the existing DOM nodes)
            links.forEach(link => container.appendChild(link));
        })();
    </script>
</body>
</html>
